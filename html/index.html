<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>QBCore Custom HUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU IMPOSTAZIONI HUD -->
    <div id="settings-menu">
        <h2>Impostazioni HUD</h2>
        <div class="setting-row">
            <label>Forma Status:</label>
            <select id="shape-select" onchange="changeShape()">
                <option value="shape-circle">Rotondo</option>
                <option value="shape-square">Quadrato</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Stile Riempimento:</label>
            <select id="fill-select" onchange="changeShape()">
                <option value="fill-liquid">Stile Liquido (Onda)</option>
                <option value="fill-solid">Solido Classico</option>
            </select>
        </div>
        <button class="close-btn" onclick="closeMenu()">Salva e Chiudi</button>
    </div>

    <div id="player-info">
        <div class="info-col">
            <div class="info-box"><i class="fas fa-briefcase"></i> <span id="job-text">...</span></div>
            <div class="info-box"><i class="fas fa-users"></i> <span id="gang-text">...</span></div>
            <div class="info-box"><i class="fas fa-id-badge"></i> <span id="id-text">ID: 0</span></div>
        </div>
        <div class="logo-box"><img src="https://cdn.discordapp.com/attachments/1488240010455945216/1506708677141467288/96x96_px.png?ex=6a167f8d&is=6a152e0d&hm=57331080d7d361978d155280dc85001635b8483714560e7bc69abae56b6c89bf">
    </div></div>
        </div>

    <div id="bottom-left-hud">
        <div class="compass-container">
            <span class="compass-heading" id="compass">N</span>
            <span class="street-name" id="street">| Caricamento...</span>
        </div>
        
        <div class="status-container" id="status-icons">
            <div class="status-item shape-circle fill-liquid" id="health"><i class="fas fa-heart"></i><div class="status-bg"></div></div>
            <div class="status-item shape-circle fill-liquid" id="armor"><i class="fas fa-shield-alt"></i><div class="status-bg"></div></div>
            <div class="status-item shape-circle fill-liquid" id="hunger"><i class="fas fa-hamburger"></i><div class="status-bg"></div></div>
            <div class="status-item shape-circle fill-liquid" id="thirst"><i class="fas fa-tint"></i><div class="status-bg"></div></div>
            <div class="status-item shape-circle fill-liquid" id="stress"><i class="fas fa-brain"></i><div class="status-bg"></div></div>
        </div>
    </div>

    <div id="speedometer" class="hidden">
        <div class="speed-text" id="speed">0</div>
        <div class="kmh">KM/H</div>
        
        <div class="vehicle-icons">
            <div class="v-icon fuel"><i class="fas fa-gas-pump"></i> <span id="fuel-text">0%</span></div>
            <div class="v-icon seatbelt off" id="seatbelt"><i class="fas fa-user-slash"></i></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
